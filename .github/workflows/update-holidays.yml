name: Update Korean Holidays

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: write

jobs:
  update-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 공휴일 데이터 가져오기
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
        run: node scripts/fetch-holidays.js

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add holidays-*.json
          git diff --cached --quiet && echo "변경사항 없음" || git commit -m "Update Korean holidays"
          git push
